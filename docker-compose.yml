version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3100:3001"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:5100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5100:5001"
    depends_on:
      - rag-engine
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RagEngine__BaseUrl=http://rag-engine:8000
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/documind.db
    volumes:
      - backend-data:/app/data
      - uploaded-docs:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5001/api/documents || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  rag-engine:
    build:
      context: ./rag-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - CHROMA_PERSIST_DIR=/app/data/chromadb
      - UPLOAD_DIR=/app/uploads
    volumes:
      - chroma-data:/app/data/chromadb
      - uploaded-docs:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

volumes:
  backend-data:
  chroma-data:
  uploaded-docs:
