# ============================================================
# DocuMind RAG - Production Docker Compose
# All services behind Nginx reverse proxy
# ============================================================

services:
  nginx:
    image: nginx:alpine
    container_name: documind-nginx
    ports:
      - "${PUBLIC_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    networks:
      - documind

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: documind-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    networks:
      - documind

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5001
      - RagEngine__BaseUrl=http://rag-engine:8000
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/documind.db
      - Cors__AllowedOrigins__0=http://localhost
      - Cors__AllowedOrigins__1=http://localhost:${PUBLIC_PORT:-80}
    volumes:
      - db-data:/app/data
      - uploads:/app/uploads
    depends_on:
      rag-engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5001/api/documents || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    networks:
      - documind

  rag-engine:
    build:
      context: ./rag-engine
      dockerfile: Dockerfile
    container_name: documind-rag-engine
    environment:
      - CHROMA_PERSIST_DIR=/app/data/chromadb
      - UPLOAD_DIR=/app/uploads
      - HOST=0.0.0.0
      - PORT=8000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - CORS_ORIGINS=http://backend:5001,http://localhost:${PUBLIC_PORT:-80}
    volumes:
      - chroma-data:/app/data/chromadb
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2048M
    networks:
      - documind

volumes:
  db-data:
    driver: local
  uploads:
    driver: local
  chroma-data:
    driver: local

networks:
  documind:
    driver: bridge
